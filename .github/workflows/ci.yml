name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ──────────────────────────────────────────────────────────────────
  # JOB 1: Lint + Test
  # Runs on every push and PR — fast feedback (< 2 min)
  # ──────────────────────────────────────────────────────────────────
  test:
    name: Lint & Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install system dependencies (Tesseract + Poppler)
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            tesseract-ocr \
            tesseract-ocr-eng \
            tesseract-ocr-rus \
            poppler-utils

      - name: Install Python dependencies
        run: pip install -r requirements-dev.txt fakeredis

      - name: Lint with ruff
        run: ruff check app/ tests/

      - name: Run tests
        env:
          API_KEY: test-api-key
          API_KEY_ENABLED: "true"
          REDIS_URL: "redis://localhost:6379/0"
        run: pytest tests/ -v --tb=short

  # ──────────────────────────────────────────────────────────────────
  # JOB 2: Docker build check
  # Verifies the Dockerfile builds without errors.
  # Only on pushes to main (not every PR, to save CI minutes).
  # ──────────────────────────────────────────────────────────────────
  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image (no push)
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: ocr-gateway:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ──────────────────────────────────────────────────────────────────
  # JOB 3: Deploy to Render
  # Triggers a Render deploy hook — Render rebuilds the container from main.
  #
  # Setup:
  #   1. Go to Render Dashboard → your service → Settings → Deploy Hook
  #   2. Copy the URL
  #   3. Add it as a GitHub secret: repo → Settings → Secrets → Actions
  #      Name: RENDER_DEPLOY_HOOK_URL
  #
  # If the secret is not set, this step is skipped gracefully.
  # ──────────────────────────────────────────────────────────────────
  deploy:
    name: Deploy to Render
    runs-on: ubuntu-latest
    needs: [test, docker-build]
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Trigger Render deploy
        env:
          RENDER_DEPLOY_HOOK_URL: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
        run: |
          if [ -z "$RENDER_DEPLOY_HOOK_URL" ]; then
            echo "⚠️  RENDER_DEPLOY_HOOK_URL secret is not set — skipping deploy."
            echo "To enable auto-deploy:"
            echo "  1. Render Dashboard → Service → Settings → Deploy Hook → copy URL"
            echo "  2. GitHub repo → Settings → Secrets → Actions → New secret"
            echo "     Name: RENDER_DEPLOY_HOOK_URL"
            exit 0
          fi
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 30 --fail "$RENDER_DEPLOY_HOOK_URL")
          echo "Render deploy triggered — HTTP status: $STATUS"
